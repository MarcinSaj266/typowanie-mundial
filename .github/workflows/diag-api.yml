name: DIAG API status (jednorazowy)

# Diagnostyka read-only: dump statusu meczów z football-data.org. Tylko dispatch.
on:
  workflow_dispatch: {}

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Dump statusu API
        run: npx tsx scripts/diagApiStatus.ts
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
